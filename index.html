<!DOCTYPE html><html lang="pl"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Lista zakupów</title><style>body{font-family:system-ui,sans-serif;background:#f4f6f1;margin:0;padding:24px}.card{max-width:720px;margin:auto;background:#fff;padding:24px;border-radius:18px;box-shadow:0 8px 30px rgba(0,0,0,.08)}li{padding:10px 0;border-bottom:1px solid #eee}button{width:100%;padding:16px;border:none;border-radius:12px;background:#59a82c;color:#fff;font-weight:700;font-size:16px}</style></head><body><div class="card"><h1 id="title"></h1><ul id="list"></ul><button id="copy">📋 Kopiuj listę do Listonic</button><p><small>Użyj: ?name=Nazwa&items=produkt1|produkt2|produkt3</small></p></div><script>const p=new URLSearchParams(location.search);const t=p.get("name")||"Lista zakupów";const raw=p.get("items")||"bajgiel|chałka|jajka|ser żółty|kiełbasa";document.getElementById("title").textContent=t;const items=raw.split("|").filter(Boolean);const ul=document.getElementById("list");items.forEach(x=>{const li=document.createElement("li");li.textContent=x;ul.appendChild(li);});document.getElementById("copy").onclick=async()=>{await navigator.clipboard.writeText(items.join("\n"));alert("Skopiowano listę. Wklej ją w Listonic.");};</script></body></html>
